name: Deploy

# Tested-image deploy on main push: builds .output natively, packages a
# COPY-only amd64 image, smoke-tests it on the runner, pushes it to
# registry.openape.ai and lets chatty pull + restart the container
# (scripts/deploy-image.mjs — health gate + tag rollback included).

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'compose/**'
      - 'scripts/deploy-image.mjs'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CHATTY_HOST: ${{ vars.DEPLOY_HOST }}
      CHATTY_USER: ${{ vars.DEPLOY_USER || 'openape' }}

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Registry auth (registry.openape.ai)
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        # `docker login` is no real test here: the registry allows anonymous
        # GETs, so login "succeeds" with any password. Probe an authed POST
        # (fails fast on a wrong secret) and write the auth explicitly.
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' -u "openape:$REGISTRY_PASSWORD" -X POST https://registry.openape.ai/v2/openape-tasks/blobs/uploads/)
          if [ "$code" != "202" ]; then
            echo "registry push-auth probe failed (HTTP $code) — check REGISTRY_PASSWORD"
            exit 1
          fi
          mkdir -p ~/.docker
          printf '{"auths":{"registry.openape.ai":{"auth":"%s"}}}' "$(printf 'openape:%s' "$REGISTRY_PASSWORD" | base64 -w0)" > ~/.docker/config.json

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          umask 077
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host $CHATTY_HOST
            User $CHATTY_USER
            IdentityFile ~/.ssh/deploy
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy tested image
        run: node scripts/deploy-image.mjs
