name: Deploy

# Auto-deploys the Nuxt app to the target host on main push.
# Host is driven by the repo variable DEPLOY_HOST; SSH auth is secret-based.
# Independent of ci.yml: health check + auto-rollback cover deploys.

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'scripts/deploy.sh'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER || 'openape' }}
      DEPLOY_BASE: ${{ vars.DEPLOY_BASE }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '3004' }}
      DEPLOY_SERVICE: ${{ vars.DEPLOY_SERVICE || 'openape-tasks.service' }}
      DEPLOY_PUBLIC_URL: ${{ vars.DEPLOY_PUBLIC_URL || 'https://tasks.openape.ai' }}

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          umask 077
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host $DEPLOY_HOST
            User $DEPLOY_USER
            IdentityFile ~/.ssh/deploy
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

      - name: Capture previous release (for rollback)
        id: prev
        run: |
          PREV=$(ssh "$DEPLOY_HOST" "readlink ${DEPLOY_BASE:-/home/$DEPLOY_USER/projects/openape-tasks}/current 2>/dev/null" || echo "")
          echo "release=$PREV" >> "$GITHUB_OUTPUT"
          echo "Previous release: ${PREV:-<none>}"

      - name: Deploy
        run: ./scripts/deploy.sh

      - name: Public HTTPS health check
        if: env.DEPLOY_PUBLIC_URL != ''
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            status=$(curl -s -o /dev/null -w '%{http_code}' "$DEPLOY_PUBLIC_URL/api/me" || echo 000)
            if [ "$status" = '200' ] || [ "$status" = '401' ]; then
              echo "$DEPLOY_PUBLIC_URL/api/me returned $status"
              exit 0
            fi
            echo "attempt $i: got $status, retrying..."
            sleep 3
          done
          echo "public health check failed after 5 attempts"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.prev.outputs.release != ''
        env:
          PREV_RELEASE: ${{ steps.prev.outputs.release }}
        run: |
          set -euo pipefail
          EXPECTED_BASE="${DEPLOY_BASE:-/home/$DEPLOY_USER/projects/openape-tasks}"
          if [[ ! "$PREV_RELEASE" =~ ^${EXPECTED_BASE}/releases/[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "refusing to roll back to unexpected path: $PREV_RELEASE"
            exit 1
          fi
          echo "Rolling back to $PREV_RELEASE"
          ssh "$DEPLOY_HOST" "ln -sfn $PREV_RELEASE $EXPECTED_BASE/current && sudo systemctl restart $DEPLOY_SERVICE"
          echo "rollback complete"
