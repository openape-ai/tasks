name: CI
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
      - name: Enable pnpm
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: App typecheck + build
        run: |
          pnpm --filter @openape-tasks/app exec nuxt prepare
          pnpm --filter @openape-tasks/app exec nuxt typecheck
          pnpm --filter @openape-tasks/app build
      - name: CLI typecheck + build
        run: |
          pnpm --filter @openape/ape-tasks exec tsc --noEmit
          pnpm --filter @openape/ape-tasks build
